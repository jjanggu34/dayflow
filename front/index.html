<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/assets/img/andamiro-favicon-180.png" />
    <meta name="theme-color" content="#ffffff" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Dayflow" />
    <title>DAYFLOW</title>
    <link rel="stylesheet" href="/assets/css/main.css" />
    <style>
      .wrap.splash {
        width: 100%;
        height: 100%;
        max-height: 100dvh;
        min-height: 100dvh;
      }
      .wrap.splash main.splash {
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        background: var(--white);
      }
      .splash-content img {
        display: block;
        width: 80%;
        height: 80%;
        margin: 0 auto;
        object-fit: contain;
      }
    </style>
    <script>
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("/sw.js");
      }
    </script>
  </head>
  <body>
    <div class="wrap splash">
      <main class="splash">
        <div class="splash-content">
          <img src="/assets/img/main/img-splash.gif" alt="안다미로" class="splash-logo" />
        </div>
      </main>
    </div>
    <script>
      setTimeout(function () {
        window.location.replace("/main");
      }, 4000);
    </script>
  </body>
</html>
