<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI 포춘쿠키 - 오늘의 해결책</title>
    <style>
      :root {
        --toss-blue: #3182f6;
        --toss-gray: #f2f4f6;
        --text-main: #191f28;
        --text-sub: #4e5968;
      }

      body {
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background-color: var(--toss-gray);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        -webkit-font-smoothing: antialiased;
      }

      .card {
        background: white;
        width: 90%;
        max-width: 400px;
        padding: 40px 20px;
        border-radius: 32px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.05);
        text-align: center;
        position: relative;
        overflow: hidden;
      }

      h1 {
        font-size: 24px;
        font-weight: 700;
        color: var(--text-main);
        margin-bottom: 8px;
      }

      .description {
        font-size: 15px;
        color: var(--text-sub);
        margin-bottom: 40px;
      }

      /* 포춘쿠키 컨테이너 */
      .cookie-container {
        position: relative;
        height: 250px;
        display: flex;
        justify-content: center;
        align-items: center;
        cursor: pointer;
      }

      /* 쿠키 이미지 설정 */
      .cookie-img {
        width: 220px;
        height: 220px;
        object-fit: contain;
        transition: transform 0.2s ease;
        z-index: 2;
      }

      /* 떨림 애니메이션 (생각 중...) */
      @keyframes shake {
        0% {
          transform: rotate(0deg);
        }
        25% {
          transform: rotate(-3deg);
        }
        50% {
          transform: rotate(3deg);
        }
        75% {
          transform: rotate(-3deg);
        }
        100% {
          transform: rotate(0deg);
        }
      }

      .shaking {
        animation: shake 0.15s infinite;
      }

      /* 종이 메시지 스타일 */
      .fortune-paper {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%) scale(0.5);
        width: 80%;
        background: #fff;
        padding: 20px;
        border-radius: 4px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        border-left: 5px solid var(--toss-blue);
        opacity: 0;
        transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        z-index: 1;
      }

      .fortune-paper.show {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1) translateY(-20px);
        z-index: 3;
      }

      .fortune-text {
        font-size: 16px;
        color: var(--text-main);
        line-height: 1.6;
        margin: 0;
        word-break: keep-all;
      }

      .reset-btn {
        margin-top: 30px;
        background-color: var(--toss-blue);
        color: white;
        border: none;
        padding: 14px 28px;
        border-radius: 14px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.2s;
        display: none;
      }

      .reset-btn:hover {
        background-color: #1b64da;
      }

      /* 페이드 아웃 */
      .fade-out {
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.3s ease;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1 id="title">오늘의 고민 해결</h1>
      <p class="description" id="desc">쿠키를 눌러 AI의 답을 확인하세요</p>

      <div class="cookie-container" id="cookie-btn">
        <!-- 초기 상태 이미지 -->
        <img
          id="cookie-image"
          class="cookie-img"
          src="https://image.spreadshirtmedia.net/image-server/v1/mp/products/T1459A2MPA3861PT28D161247071FS2755/views/1,width=800,height=800,appearanceId=2,backgroundColor=F2F2F2/fortune-cookie-sticker.jpg"
          alt="포춘쿠키"
        />

        <!-- 종이 메시지 -->
        <div class="fortune-paper" id="fortune-paper">
          <p class="fortune-text" id="fortune-result">AI가 당신의 고민을 분석하고 있습니다...</p>
        </div>
      </div>

      <button class="reset-btn" id="reset-btn" onclick="resetAll()">다른 쿠키 열기</button>
    </div>

    <script>
      const cookieBtn = document.getElementById("cookie-btn");
      const cookieImg = document.getElementById("cookie-image");
      const fortunePaper = document.getElementById("fortune-paper");
      const fortuneResult = document.getElementById("fortune-result");
      const resetBtn = document.getElementById("reset-btn");
      const title = document.getElementById("title");

      // 단계별 이미지 소스 (생성된 이미지 스타일 반영)
      // 실제 운영시에는 생성된 PNG 파일 경로로 교체하시면 됩니다.
      const imgStep1 = "https://cdn-icons-png.flaticon.com/512/2161/2161556.png"; // 안 깨짐
      const imgStep2 = "https://cdn-icons-png.flaticon.com/512/2161/2161558.png"; // 깨짐

      const fortunes = [
        "이미 당신 마음 속에 답이 있네요. 그 길을 믿고 나아가세요. 🍀",
        "조금 늦더라도 괜찮아요. 당신의 속도는 틀리지 않았습니다.",
        "오늘은 주변의 조언보다 당신의 직감을 따르는 것이 좋습니다. ✨",
        "생각보다 큰 행운이 가까이 와 있어요. 마음을 열고 기다려보세요.",
        "완벽하지 않아도 괜찮습니다. 시작했다는 것만으로도 충분해요.",
        "잠시 멈춰 서서 하늘을 보세요. 여유가 해결책을 가져다줄 것입니다.",
      ];

      let isAnimating = false;

      cookieBtn.addEventListener("click", () => {
        if (isAnimating) return;
        isAnimating = true;

        // 1. AI 추론 느낌의 떨림 효과
        cookieImg.classList.add("shaking");
        title.innerText = "답변을 생성 중...";

        setTimeout(() => {
          // 2. 떨림 멈추고 쿠키 깨지는 이미지로 교체
          cookieImg.classList.remove("shaking");
          cookieImg.src = imgStep2;
          cookieImg.classList.add("fade-out"); // 쿠키를 투명하게 날림

          // 3. 랜덤 문구 선택 및 종이 등장
          const randomMsg = fortunes[Math.floor(Math.random() * fortunes.length)];
          fortuneResult.innerText = randomMsg;
          fortunePaper.classList.add("show");

          title.innerText = "오늘의 해결책";
          resetBtn.style.display = "inline-block";
        }, 1500); // 1.5초간 생각하는 척
      });

      function resetAll() {
        isAnimating = false;
        cookieImg.src = imgStep1;
        cookieImg.classList.remove("fade-out");
        fortunePaper.classList.remove("show");
        resetBtn.style.display = "none";
        title.innerText = "오늘의 고민 해결";
      }
    </script>
  </body>
</html>
