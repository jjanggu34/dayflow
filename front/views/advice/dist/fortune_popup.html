<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>오늘의 운세 — 포춘쿠키</title>
    <link rel="stylesheet" href="/assets/css/common.css" />
    <link rel="stylesheet" href="/assets/css/button.css" />
    <link rel="stylesheet" href="/assets/css/popup.css" />
    <link rel="stylesheet" href="/assets/css/advice.css" />
  </head>
  <body class="fortune-popup-page">
    <div id="fulPopup01" class="layerPopup full on">
      <!--[D] fullPopupOn 클래스 :: 헤더 스크립트 적용중-->
      <div class="pop-area">
        <div class="pop-body">
          <div class="pop-content">
            <div id="intro-screen" class="fortune-intro">
              <div class="fortune-intro__inner">
                <div class="title-tiles" role="heading" aria-level="1">
                  <span class="title-tile">오</span>
                  <span class="title-tile">늘</span>
                  <span class="title-tile">의</span>
                  <span class="title-tile">운</span>
                  <span class="title-tile">세</span>
                </div>
                <p class="fortune-subtitle">바삭한 쿠키속에 숨겨진 <strong>당신의 행운</strong>을 확인해보세요!</p>

                <div class="fortune-cookie-block">
                  <div class="fortune-glow" aria-hidden="true"></div>
                  <div class="cookie-container" id="cookie-btn" role="button" tabindex="0" aria-label="포춘쿠키 열기">
                    <img id="cookie-image" class="cookie-img" src="/assets/img/advice/popup-img-fortune.png" alt="포춘쿠키" />
                    <p class="fortune-text" id="fortune-result" hidden>오후 3시, 달콤한 커피 한 잔이 당신의 운을 깨워줄 거예요.</p>
                  </div>
                  <!--<p class="fortune-hint-pill">
                      <span class="ico" aria-hidden="true">💡</span>
                      쿠키를 눌러 오늘의 행운을 확인하세요!
                    </p>-->
                </div>

                <div class="fortune-info-card">
                  <p>쿠키를 눌러 오늘의 행운을 확인하세요!</p>
                </div>
              </div>
            </div>
          </div>
        </div>
        <div class="pop-footer">
          <div class="btn-content">
            <button type="button" class="btn-ctp" id="btnGoAdviceIntro">조언으로 보러가기</button>
            <button type="button" class="btn-text fortune-result__home" id="btnCloseResult">홈으로</button>
          </div>
        </div>
      </div>
    </div>

    <script>
      (function () {
        var cookieBtn = document.getElementById("cookie-btn");
        var cookieImg = document.getElementById("cookie-image");
        var fortuneResult = document.getElementById("fortune-result");
        var imgBroken = "/assets/img/advice/popup-img-fortune-cookie.png";

        var fortunes = [
          "오후 3시, 달콤한 커피 한 잔이 당신의 운을 깨워줄 거예요.",
          "이미 당신 마음 속에 답이 있어요. 그 길을 믿고 나아가세요.",
          "조금 늦더라도 괜찮아요. 당신의 속도는 틀리지 않았습니다.",
          "오늘은 주변의 조언보다 당신의 직감을 따르는 것이 좋습니다.",
          "생각보다 큰 행운이 가까이 와 있어요. 마음을 열고 기다려보세요.",
          "완벽하지 않아도 괜찮습니다. 시작했다는 것만으로도 충분해요.",
        ];

        var isAnimating = false;

        function goAdvice() {
          var url = "/advice";
          try {
            if (window.parent && window.parent !== window) {
              window.parent.location.href = url;
            } else {
              window.location.href = url;
            }
          } catch (e) {
            window.location.href = url;
          }
        }

        function showResult(text) {
          if (text) fortuneResult.textContent = text;
          fortuneResult.hidden = false;
          cookieImg.hidden = true;
          document.body.classList.add("fortune-result-open");
        }

        function resetAll() {
          isAnimating = false;
          cookieImg.classList.remove("fade-out", "shaking");
          cookieImg.src = "/assets/img/advice/popup-img-fortune.png";
          cookieImg.hidden = false;
          fortuneResult.hidden = true;
          document.body.classList.remove("fortune-result-open");
        }

        function openCookie() {
          if (isAnimating) return;
          isAnimating = true;
          cookieImg.classList.add("shaking");

          setTimeout(function () {
            cookieImg.classList.remove("shaking");
            cookieImg.classList.add("fade-out");
            cookieImg.src = imgBroken;

            var randomMsg = fortunes[Math.floor(Math.random() * fortunes.length)];
            setTimeout(function () {
              showResult(randomMsg);
            }, 280);
          }, 1200);
        }

        cookieBtn.addEventListener("click", openCookie);
        cookieBtn.addEventListener("keydown", function (e) {
          if (e.key === "Enter" || e.key === " ") {
            e.preventDefault();
            openCookie();
          }
        });

        document.getElementById("btnGoAdviceIntro").addEventListener("click", goAdvice);
        document.getElementById("btnCloseResult").addEventListener("click", resetAll);

        cookieImg.addEventListener("error", function () {
          this.src = "/assets/img/advice/popup-img-fortune.png";
        });
      })();
    </script>
  </body>
</html>
