<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0,viewport-fit=cover" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/assets/img/pwa/icon-180.png" />
  <meta name="theme-color" content="#1D1D2E" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Dayflow" />
  <title>DAYFLOW — 로그인</title>
  <link rel="stylesheet" href="/assets/css/main.css" />
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js');
    }
  </script>
  <style>
    .login-wrap {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 0 24px;
      background: var(--color-f8);
    }
    .login-logo {
      text-align: center;
      margin-bottom: 48px;
    }
    .login-logo h1 {
      font-size: var(--font28);
      font-weight: 700;
      color: var(--primary);
      letter-spacing: -0.5px;
    }
    .login-logo p {
      font-size: var(--font14);
      color: var(--text-sub);
      margin-top: 6px;
    }
    .login-form {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .login-input {
      width: 100%;
      height: 52px;
      padding: 0 16px;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: var(--font16);
      font-family: inherit;
      color: var(--title);
      background: var(--white);
      outline: none;
    }
    .login-input:focus {
      border-color: var(--primary);
    }
    .login-btn {
      width: 100%;
      height: 52px;
      border: none;
      border-radius: 10px;
      font-size: var(--font16);
      font-family: inherit;
      font-weight: 600;
      cursor: pointer;
      margin-top: 4px;
    }
    .login-btn-primary {
      background: var(--primary);
      color: var(--white);
    }
    .login-btn-primary:disabled {
      background: var(--bg-disabled);
      color: var(--text-disabled);
      cursor: default;
    }
    .login-btn-secondary {
      background: transparent;
      color: var(--text-sub);
      font-weight: 400;
      font-size: var(--font14);
    }
    .login-error {
      font-size: var(--font13, 0.8125rem);
      color: #e53935;
      text-align: center;
      min-height: 20px;
    }
    .login-divider {
      text-align: center;
      font-size: var(--font13, 0.8125rem);
      color: var(--text-disabled);
      margin: 4px 0;
    }
    .login-mode-label {
      text-align: center;
      font-size: var(--font14);
      color: var(--text-sub);
      margin-top: 8px;
    }
    .login-btn-google {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: var(--white);
      color: var(--title);
      border: 1px solid var(--border);
      font-weight: 500;
    }
    .login-btn-google svg {
      flex-shrink: 0;
    }
    .login-separator {
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--text-disabled);
      font-size: var(--font13, 0.8125rem);
    }
    .login-separator::before,
    .login-separator::after {
      content: "";
      flex: 1;
      height: 1px;
      background: var(--border);
    }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-logo">
      <h1>안다미로</h1>
      <p id="loginSubtitle">오늘의 감정을 기록하세요</p>
    </div>

    <div class="login-form">
      <!-- 이메일/비밀번호 로그인·회원가입 — 추후 사용 예정
      <input id="loginEmail" class="login-input" type="email" placeholder="이메일" autocomplete="email" />
      <input id="loginPassword" class="login-input" type="password" placeholder="비밀번호" autocomplete="current-password" />
      <p id="loginError" class="login-error"></p>
      <button id="loginSubmitBtn" class="login-btn login-btn-primary">로그인</button>
      <div class="login-divider">또는</div>
      <button id="loginToggleBtn" class="login-btn login-btn-secondary">회원가입</button>
      <div class="login-separator">간편 로그인</div>
      -->
      <button id="loginGoogleBtn" class="login-btn login-btn-google">
        <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
          <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z" fill="#4285F4"/>
          <path d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/>
          <path d="M3.964 10.707A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.707V4.961H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.039l3.007-2.332z" fill="#FBBC05"/>
          <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.961L3.964 6.293C4.672 4.166 6.656 3.58 9 3.58z" fill="#EA4335"/>
        </svg>
        Google로 계속하기
      </button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="/assets/js/config/supabase-config.js"></script>
  <script src="/assets/js/agents/authAgent.js"></script>
  <script src="/assets/js/view/login.js"></script>
</body>
</html>
