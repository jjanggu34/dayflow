<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/assets/img/pwa/icon-180.png" />
    <meta name="theme-color" content="#1D1D2E" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Dayflow" />
    <title>DAYFLOW — 감정기록</title>
    <link rel="stylesheet" href="/assets/css/main.css" />
    <style>
      .card-list ul#chatListRoot li[data-diary-id] {
        cursor: pointer;
        list-style: none;
      }
      .card-list ul#chatListRoot li[data-diary-id]:hover {
        opacity: 0.92;
      }
      .card-list ul#chatListRoot li.card-list__empty {
        cursor: default;
      }
    </style>
    <script>
      (function () {
        var h = "";
        try {
          h = location.hostname || "";
        } catch (e) {}
        var isLocal = h === "localhost" || h === "127.0.0.1";
        if ("serviceWorker" in navigator && isLocal) {
          navigator.serviceWorker.getRegistrations().then(function (regs) {
            regs.forEach(function (r) {
              r.unregister();
            });
          });
        } else if ("serviceWorker" in navigator) {
          navigator.serviceWorker.register("/sw.js");
        }
      })();
    </script>
  </head>
  <body>
    <div class="wrap has-tab-footer">
      <header class="headerWrap" role="banner">
        <button type="button" class="back" id="chatBackBtn" aria-label="이전 화면으로">이전 화면으로</button>
        <h1><span>감정기록</span></h1>
      </header>
      <div id="bodyWrap" class="advice-page">
        <main class="advice-main">
          <div id="adviceMainContent">
            <section class="card-list">
              <ul id="chatListRoot" aria-label="감정 기록 목록"></ul>
            </section>
          </div>
        </main>
      </div>
    </div>

    <script src="/assets/js/ui/com/includeFooter.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="/assets/js/config/supabase-config.js"></script>
    <script src="/assets/js/agents/authAgent.js"></script>
    <script src="/assets/js/domain/supabaseStore.js"></script>
    <script src="/assets/js/ui/com/emptyDiaryCta.js"></script>
    <script src="/assets/js/lib/jquery-1.12.4.js"></script>
    <script src="/assets/js/agents/apikeyManager.js"></script>
    <script src="/assets/js/agents/chatAgent.js"></script>
    <script src="/assets/js/view/chat-list.js"></script>
  </body>
</html>
