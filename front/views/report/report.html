<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/assets/img/pwa/icon-180.png" />
    <meta name="theme-color" content="#1D1D2E" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Dayflow" />
    <title>DAYFLOW — 리포트</title>
    <link rel="stylesheet" href="/assets/css/main.css" />
    <link rel="stylesheet" href="/assets/css/report.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr@4.6.13/dist/flatpickr.min.css" />
    <script>
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("/sw.js");
      }
    </script>
  </head>
  <body class="report-page">
    <div class="wrap report-wrap has-tab-footer">
      <header class="headerWrap" role="banner">
        <button type="button" class="back" id="chatBackBtn" aria-label="이전 화면으로">이전 화면으로</button>
        <h1 class="report-header__title">리포트</h1>
      </header>
      <div id="bodyWrap" class="report-page">
        <main class="report-main" role="main">
          <div id="reportHeroAndCharts" class="report-hero-charts">
            <section class="importance-content">
              <div class="text-content">
                <div class="text-group">
                  <p>4월의 감정은 어땠을까요?</p>
                  <h2>한 달의 마음 흐름을 돌아보세요!</h2>
                </div>
              </div>
            </section>
            <section class="importance-content report-section report-section--chart">
              <div class="bar-graph-content">
                <div class="text-content sm report-panel">
                  <div class="text-group">
                    <p class="report-hero__date">이번 달 요일별 평균</p>
                    <h2 class="report-hero__headline">요일별 에너지</h2>
                  </div>
                  <!--<p id="patternSubLabel" class="report-sub-label">요일별 감정 점수 평균을 보여드려요.</p>
                <p id="reportEmptyHint" class="report-empty-hint" hidden>기록된 감정 데이터가 아직 없습니다.</p>-->
                  <div id="patWeekBars" class="bar-graph-content__graph" aria-label="요일별 에너지 막대"></div>
                </div>
              </div>
              <hr />

              <div class="bar-graph-content">
                <div class="text-content sm report-panel">
                  <div class="text-group">
                    <p>감정 리포트</p>
                    <h2>이번달 감정 순위</h2>
                  </div>
                  <div class="bubble-graph-content__graph">
                    <div class="round-graph-content__graph-item" id="emotionRankList"></div>
                  </div>
                </div>
              </div>
            </section>
          </div>
          <section class="card-content report-section">
            <div class="card-item report-insight-card">
              <h3>
                <span></span>
                패턴 인사이트
              </h3>
              <ul id="insightList" aria-live="polite"></ul>
            </div>
          </section>
          <section class="no-data report-empty-cta" id="reportEmptyState" hidden aria-label="감정 기록 없음 안내">
            <div id="emptyDiaryCtaHost"></div>
          </section>
        </main>
      </div>
      <div id="footerIncludeHost" data-app-tab="report"></div>
    </div>

    <script src="/assets/js/ui/com/includeFooter.js"></script>
    <script src="/assets/js/lib/dexie.min.js"></script>
    <script src="/assets/js/config/db-config.js"></script>
    <script src="/assets/js/ui/com/emptyDiaryCta.js"></script>
    <script src="/assets/js/lib/jquery-1.12.4.js"></script>
    <script src="/assets/js/agents/apikeyManager.js"></script>
    <script src="/assets/js/agents/chatAgent.js"></script>
    <script src="/assets/js/view/report.js"></script>
  </body>
</html>
