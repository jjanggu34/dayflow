<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>DAYFLOW — 오늘의 일기</title>
    <link rel="stylesheet" href="../../assets/css/main.css" />
  </head>
  <body>
    <div class="wrap">
      <header class="headerWrap" role="banner">
        <button type="button" class="back" id="chatBackBtn" aria-label="이전 화면으로">이전 화면으로</button>
        <h1>오늘의 일기</h1>
        <button type="button" class="chat-header__gear" id="chatApikeyBtn" aria-label="Claude API 키 설정" title="API 키">⚙</button>
      </header>
      <div id="bodyWrap" class="chat chat--diary">
        <main class="chat-thread" id="chatThread" role="main">
          <div class="chat-thread__inner">
            <div id="chatMessages" class="chat-messages" role="log" aria-live="polite" aria-relevant="additions" aria-label="대화 메시지"></div>
          </div>
        </main>

        <footer class="chat-composer">
          <div class="chat-voice-banner" id="chatVoiceBanner" hidden>
            <span class="chat-voice-banner__pulse" aria-hidden="true"></span>
            <span class="chat-voice-banner__text">음성 대화 중 — 말씀하신 뒤 2초 뒤 자동 전송돼요</span>
            <button type="button" class="chat-voice-banner__cancel" id="chatVoiceCancel">취소</button>
          </div>
          <!--<div class="chat-tts-row">
            <label class="chat-tts-row__label" for="chatTtsStyle">듣기 목소리</label>
            <select id="chatTtsStyle" class="chat-tts-row__select" title="AI 음성 재생 스타일">
              <option value="default">기본 (덜 기계적)</option>
              <option value="natural">자연스러운</option>
              <option value="cute">귀여운 톤</option>
              <option value="warm">정감 톤</option>
            </select>
          </div>-->
          <div class="chat-composer__row">
            <button type="button" class="chat-composer__attach" id="chatAttachBtn" aria-label="사진 첨부">
              <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <path d="M9 4v10M4 9h10" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" />
              </svg>
            </button>
            <div class="chat-composer__field">
              <label class="chat-visually-hidden" for="chatInput">메시지 입력</label>
              <textarea id="chatInput" class="chat-composer__input" rows="1" placeholder="질문을 입력해 보세요" autocomplete="off"></textarea>
              <button type="button" class="chat-composer__mic" id="chatMicBtn" aria-label="음성 대화 (말한 뒤 2초 뒤 자동 전송)" aria-pressed="false">
                <svg width="16" height="18" viewBox="0 0 16 18" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                  <rect x="4" y="1" width="8" height="11" rx="4" stroke="currentColor" stroke-width="1.4" />
                  <path d="M1 9.5c0 3.9 3.1 7 7 7s7-3.1 7-7" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" />
                  <path d="M8 16.5v1.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" />
                </svg>
              </button>
            </div>
            <button type="button" class="chat-composer__send" id="chatSendBtn" aria-label="보내기" disabled>
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <path d="M8 3v10M4 7l4-4 4 4" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" />
              </svg>
            </button>
          </div>
          <input type="file" id="chatImgInput" accept="image/*" class="chat-visually-hidden" tabindex="-1" aria-hidden="true" />
        </footer>
      </div>
    </div>
    <!-- 로컬 전용: 주석 해제 후 키 입력 시 ⚙ 프롬프트 없이 동작. 키가 들어간 HTML/스크립트는 Git에 올리지 마세요. -->
    <!-- <script>window.DAYFLOW_ANTHROPIC_API_KEY = "sk-ant-api03-…";</script> -->
    <script src="../../assets/js/lib/jquery-1.12.4.js"></script>
    <script src="../../assets/js/domain/emotionChatData.js"></script>
    <script src="../../assets/js/agents/apikeyManager.js"></script>
    <script src="../../assets/js/agents/chatAgent.js"></script>
    <script src="/assets/js/lib/dexie.min.js"></script>
    <script src="../../assets/js/config/db-config.js"></script>
    <script src="../../assets/js/domain/diaryStore.js"></script>
    <script src="../../assets/js/view/chat.js"></script>
  </body>
</html>
